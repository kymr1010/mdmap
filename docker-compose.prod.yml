services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile.frontend.prod
      args:
        VITE_API_BASE_URL: /api
        VITE_LOGIN_QUERY_KEY: ${VITE_LOGIN_QUERY_KEY}
        VITE_LOGIN_QUERY_VALUE: ${VITE_LOGIN_QUERY_VALUE}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend.prod
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://${DB_USER}:${DB_PASS}@mariadb:3306/${DB_NAME}
      MEMOAPP_FRONTEND_ORIGIN: ${MEMOAPP_FRONTEND_ORIGIN}
      MEMOAPP_ADMIN_PASSWORD: ${MEMOAPP_ADMIN_PASSWORD}
      MEMOAPP_COOKIE_SECURE: ${MEMOAPP_COOKIE_SECURE:-true}
    expose:
      - "8082"
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  caddy_data:
  caddy_config:
  mariadb_data:
